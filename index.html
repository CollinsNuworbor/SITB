<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SITB - Solving Is The Best</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="calculator">
    <h1>SITB</h1>
    <input type="text" id="display" class="display" disabled>
    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="clear" onclick="backspace()">CE</button>
      <button class="operator" onclick="insert('%')">%</button>
      <button class="operator" onclick="insert('/')">÷</button>

      <button class="number" onclick="insert('7')">7</button>
      <button class="number" onclick="insert('8')">8</button>
      <button class="number" onclick="insert('9')">9</button>
      <button class="operator" onclick="insert('*')">×</button>

      <button class="number" onclick="insert('4')">4</button>
      <button class="number" onclick="insert('5')">5</button>
      <button class="number" onclick="insert('6')">6</button>
      <button class="operator" onclick="insert('-')">−</button>

      <button class="number" onclick="insert('1')">1</button>
      <button class="number" onclick="insert('2')">2</button>
      <button class="number" onclick="insert('3')">3</button>
      <button class="operator" onclick="insert('+')">+</button>

      <button class="number" onclick="insert('0')">0</button>
      <button class="number" onclick="insert('.')">.</button>
      <button class="equals" onclick="calculate()">=</button>
      <button class="operator" onclick="insert('**')">^</button>

      <button class="special" onclick="sqrt()">√</button>
      <button class="special" onclick="sin()">sin</button>
      <button class="special" onclick="cos()">cos</button>
      <button class="special" onclick="tan()">tan</button>

      <button class="special" onclick="log()">log</button>
      <button class="special" onclick="pi()">π</button>
      <button class="special" onclick="e()">e</button>
      <button class="special" onclick="fact()">n!</button>
    </div>
    <div class="history">
      <h2>History</h2>
      <ul id="history"></ul>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
